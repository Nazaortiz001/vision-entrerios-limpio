<!DOCTYPE html>
<html lang="es">
<head>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VER | Visión Entre Ríos</title>
    <meta property="og:title" content="VER | Visión Entre Ríos">
    <meta property="og:description" content="Lee la noticia completa en nuestro portal de actualidad.">
    <meta property="og:image" content="https://visionentrerios.com.ar/logotipo.png">
    
    <link rel="icon" type="image/png" href="logotipo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* === VARIABLES & RESET === */
        :root { 
            --ver-red: #cc0000; 
            --ver-dark: #0f1115; 
            --ver-bg-body: #ffffff; 
            --ver-text-main: #1a1a1a; 
            --ver-border: #eaeaea; 
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            --font-title: 'Georgia', 'Times New Roman', serif; 
        }

        body.dark-mode { 
            --ver-bg-body: #0b0c10; 
            --ver-text-main: #e0e0e0; 
            --ver-dark: #f0f2f5; 
            --ver-border: #2a2d34; 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            background-color: var(--ver-bg-body); 
            color: var(--ver-text-main); 
            font-family: var(--font-title); 
            line-height: 1.6; 
            overflow-x: hidden; 
            transition: 0.3s; 
        }

        a { 
            text-decoration: none; 
            color: inherit; 
        }

        /* === TOP BAR Y HEADER === */
        header { 
            background-color: var(--ver-bg-body); 
            padding: 1rem 5%; 
            border-bottom: 2px solid var(--ver-red); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .main-logo { 
            max-height: 60px; 
            width: auto; 
        }

        body.dark-mode .main-logo { 
            filter: brightness(0) invert(1); 
        }

        .back-btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-family: var(--font-main); 
            font-weight: 900; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
        }

        .back-btn:hover { 
            color: var(--ver-red); 
        }

        .theme-toggle { 
            background: var(--ver-border); 
            border: none; 
            color: var(--ver-text-main); 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* === ESTRUCTURA DEL ARTÍCULO === */
        .article-wrapper { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 4rem 5% 2rem 5%; 
        }

        .article-header { 
            text-align: center; 
            margin-bottom: 2.5rem; 
        }

        .volanta { 
            background-color: var(--ver-red); 
            color: white; 
            font-family: var(--font-main); 
            padding: 5px 12px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: inline-block; 
            margin-bottom: 1.5rem; 
            border-radius: 3px; 
        }

        h1 { 
            font-family: var(--font-main); 
            font-size: 3.5rem; 
            line-height: 1.1; 
            margin-bottom: 1.5rem; 
            font-weight: 900; 
            color: var(--ver-text-main); 
            text-wrap: balance;
        }

        .bajada { 
            font-size: 1.3rem; 
            color: #666666; 
            font-style: italic; 
        }

        .article-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-family: var(--font-main); 
            font-size: 0.85rem; 
            color: #777777; 
            border-top: 1px solid var(--ver-border); 
            border-bottom: 1px solid var(--ver-border); 
            padding: 1rem 0; 
            margin-bottom: 1.5rem; 
            text-transform: uppercase; 
            font-weight: 800; 
        }

        .author-date strong { 
            color: var(--ver-red); 
            margin-right: 15px;
        }

        /* === BOTONES DE REDES SOCIALES === */
        .share-buttons { 
            display: flex; 
            gap: 10px; 
        }

        .share-btn { 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            color: white !important; 
            font-size: 1.1rem; 
            text-decoration: none; 
            transition: 0.3s; 
        }

        .share-btn:hover { 
            transform: translateY(-3px); 
        }

        .btn-wa { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-x { background-color: #000000; border: 1px solid #333333; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        /* === MÓDULO AUDIO-LECTURA === */
        .audio-player-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 3rem;
            align-items: center;
        }

        .audio-btn {
            background: var(--ver-border);
            color: var(--ver-text-main);
            border: 2px solid transparent;
            padding: 8px 18px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .audio-btn:hover {
            background: var(--ver-red);
            color: white;
            border-color: var(--ver-red);
        }

        .audio-btn-stop {
            background: transparent;
            border: 2px solid var(--ver-text-main);
            display: none;
        }

        .audio-btn-stop:hover {
            background: var(--ver-text-main);
            color: var(--ver-bg-body);
        }

        /* === CONTENIDO PRINCIPAL === */
        .image-container { 
            margin-bottom: 3rem; 
            width: 100%; 
            border-radius: 6px; 
            overflow: hidden; 
        }

        .main-image { 
            width: 100%; 
            max-height: 550px; 
            object-fit: cover; 
        }

        .article-body { 
            max-width: 750px; 
            margin: 0 auto; 
            font-size: 1.15rem; 
            line-height: 1.8; 
            color: var(--ver-text-main); 
        }

        .article-body p { 
            margin-bottom: 1.8rem; 
        }

        .article-body h2 { 
            font-family: var(--font-main); 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin: 3rem 0 1.5rem; 
            border-left: 4px solid var(--ver-red); 
            padding-left: 15px;
        }
        
        /* === FOOTER === */
        footer { 
            background-color: #050505; 
            color: white; 
            padding: 3rem 5%; 
            text-align: center; 
            border-top: 4px solid var(--ver-red); 
            margin-top: 4rem;
        }

        .footer-logo { 
            max-height: 45px; 
            filter: brightness(0) invert(1); 
            margin-bottom: 15px; 
        }

        /* === RESPONSIVE MÓVIL === */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .article-meta { flex-direction: column; align-items: flex-start; gap: 15px; }
            .back-btn span { display: none; } 
        }
    </style>
</head>
<body>
    
    <header>
        <div style="width: 100px;">
            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Volver</span>
            </a>
        </div>
        <div style="flex-grow: 1; text-align: center;">
            <a href="index.html">
                <img src="logotipo.png" alt="VER" class="main-logo">
            </a>
        </div>
        <div style="width: 100px; text-align: right;">
            <button class="theme-toggle" id="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="article-wrapper">
        <div class="article-header">
            <span class="volanta" id="cat-label">Cargando...</span>
            <h1 id="art-titulo">Obteniendo información...</h1>
            <p class="bajada" id="art-bajada"></p>
        </div>
        
        <div class="article-meta">
            <div class="author-date">
                <strong id="art-autor">REDACCIÓN VER</strong>
                <span id="art-fecha"></span>
                <a href="#disqus_thread" style="margin-left: 15px; color: var(--ver-text-main); font-size: 0.75rem;"><i class="fa-regular fa-comments"></i> Comentarios</a>
            </div>
            
            <div class="share-buttons">
                <a href="#" class="share-btn btn-wa" id="share-wa" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#" class="share-btn btn-fb" id="share-fb" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="share-btn btn-x" id="share-x" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="share-btn btn-ig" id="share-ig" title="Copiar Enlace"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>

        <div class="audio-player-wrapper">
            <button id="btn-audio-play" class="audio-btn">
                <i class="fa-solid fa-volume-high"></i> Escuchar Noticia
            </button>
            <button id="btn-audio-stop" class="audio-btn audio-btn-stop">
                <i class="fa-solid fa-stop"></i> Detener
            </button>
        </div>

        <div class="image-container">
            <img src="" id="art-imagen" class="main-image" style="display:none;">
        </div>
        
        <div class="article-body" id="art-contenido">
        </div>

        <div id="disqus_thread" style="max-width: 750px; margin: 4rem auto 0; border-top: 2px solid var(--ver-red); padding-top: 2rem;"></div>
        <script>
            var disqus_config = function () {
                this.page.url = window.location.href;  
                this.page.identifier = new URLSearchParams(window.location.search).get('id'); 
            };
            (function() { 
                var d = document, s = d.createElement('script');
                s.src = 'https://visionentrerios.disqus.com/embed.js'; 
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
    </main>

    <footer>
        <img src="logotipo.png" alt="VER" class="footer-logo">
        <p>&copy; 2026 Visión Entre Ríos.</p>
    </footer>

    <script id="dsq-count-scr" src="//visionentrerios.disqus.com/count.js" async></script>

    <script>
        // === MODO NOCHE ===
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const themeIcon = themeToggle.querySelector('i');
        
        if (localStorage.getItem('theme') === 'dark') { 
            body.classList.add('dark-mode'); 
            themeIcon.classList.replace('fa-moon', 'fa-sun'); 
        }
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if (isDark) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // === CONEXIÓN POCKETBASE ===
        const pb = new PocketBase('https://ver.pockethost.io'); 

        async function cargarDetalleNoticia() {
            const params = new URLSearchParams(window.location.search);
            const noticiaId = params.get('id');
            
            if (!noticiaId) {
                return window.location.href = 'index.html';
            }

            try {
                // Registrar vista
                try {
                    const currentRecord = await pb.collection('articulos').getOne(noticiaId);
                    await pb.collection('articulos').update(noticiaId, { vistas: (currentRecord.vistas || 0) + 1 });
                } catch(e) {}

                // Obtener registro
                const record = await pb.collection('articulos').getOne(noticiaId);
                
                // Actualizar HTML
                document.title = `${record.titulo} | VER`;
                document.getElementById('art-titulo').innerText = record.titulo;
                document.getElementById('art-bajada').innerText = record.bajada;
                document.getElementById('cat-label').innerText = record.seccion || record.categoria;
                document.getElementById('art-fecha').innerText = new Date(record.created).toLocaleDateString('es-ES');
                document.getElementById('art-contenido').innerHTML = record.contenido;

                // Cargar imagen
                if (record.imagen) {
                    const imgUrl = pb.files.getUrl(record, record.imagen);
                    const imgTag = document.getElementById('art-imagen');
                    imgTag.src = imgUrl;
                    imgTag.style.display = 'block';
                }

                // LÓGICA DEL REPRODUCTOR DE AUDIO (TEXT-TO-SPEECH)
                const btnAudioPlay = document.getElementById('btn-audio-play');
                const btnAudioStop = document.getElementById('btn-audio-stop');
                let synth = window.speechSynthesis;

                btnAudioPlay.addEventListener('click', () => {
                    if (synth.speaking) {
                        if (synth.paused) {
                            synth.resume();
                            btnAudioPlay.innerHTML = '<i class="fa-solid fa-pause"></i> Pausar';
                        } else {
                            synth.pause();
                            btnAudioPlay.innerHTML = '<i class="fa-solid fa-volume-high"></i> Continuar';
                        }
                    } else {
                        // Limpiamos etiquetas HTML del contenido para que lea bien
                        let divContenido = document.createElement("div");
                        divContenido.innerHTML = record.contenido;
                        let textoPuro = divContenido.textContent || divContenido.innerText || "";
                        
                        let textoCompleto = record.titulo + "... " + record.bajada + "... " + textoPuro;
                        let utterance = new SpeechSynthesisUtterance(textoCompleto);
                        
                        utterance.lang = 'es-AR'; // Español Argentina
                        utterance.rate = 1; // Velocidad normal

                        utterance.onend = () => {
                            btnAudioPlay.innerHTML = '<i class="fa-solid fa-volume-high"></i> Escuchar Noticia';
                            btnAudioStop.style.display = 'none';
                        };

                        synth.speak(utterance);
                        btnAudioPlay.innerHTML = '<i class="fa-solid fa-pause"></i> Pausar';
                        btnAudioStop.style.display = 'inline-flex';
                    }
                });

                btnAudioStop.addEventListener('click', () => {
                    synth.cancel();
                    btnAudioPlay.innerHTML = '<i class="fa-solid fa-volume-high"></i> Escuchar Noticia';
                    btnAudioStop.style.display = 'none';
                });

                // Si el usuario se va de la página, apagamos la voz
                window.addEventListener('beforeunload', () => {
                    synth.cancel();
                });

                // === ARMADO DE BOTONES DE COMPARTIR CON REDIRECCIÓN DEFINITIVA ===
                const urlCompartir = "https://visionentrerios.com.ar/compartir?id=" + record.id;
                
                const tituloEncoded = encodeURIComponent(record.titulo);
                const bajadaEncoded = encodeURIComponent(record.bajada);
                const urlEncoded = encodeURIComponent(urlCompartir);

                document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${urlEncoded}`;
                document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${tituloEncoded}&url=${urlEncoded}`;
                
                // === MAGIA PARA WHATSAPP: Forzamos la apertura de la App ===
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const waUrl = isMobile 
                    ? `whatsapp://send?text=*${tituloEncoded}*%0A${bajadaEncoded}%0A%0A${urlEncoded}`
                    : `https://web.whatsapp.com/send?text=*${tituloEncoded}*%0A${bajadaEncoded}%0A%0A${urlEncoded}`;
                
                document.getElementById('share-wa').href = waUrl;
                
                document.getElementById('share-ig').addEventListener('click', async (e) => {
                    e.preventDefault();
                    if (navigator.share) {
                        try { await navigator.share({ title: record.titulo, text: record.bajada, url: urlCompartir }); } catch (err) {}
                    } else {
                        navigator.clipboard.writeText(urlCompartir);
                        Swal.fire({ icon: 'success', title: '¡Copiado!', text: 'El enlace se copió al portapapeles.', confirmButtonColor: '#cc0000' });
                    }
                });

            } catch (error) {
                document.getElementById('art-titulo').innerText = "Noticia no encontrada.";
            }
        }
        
        cargarDetalleNoticia();
    </script>
</body>
</html>
